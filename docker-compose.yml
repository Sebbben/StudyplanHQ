services:
  db:
    image: postgres:17-alpine
    container_name: studyplanhq-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: studyplanhq
      POSTGRES_USER: studyplan
      POSTGRES_PASSWORD: studyplan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyplan -d studyplanhq"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://studyplan:studyplan@db:5432/studyplanhq
    ports:
      - "3000:3000"

volumes:
  postgres-data:
